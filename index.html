<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last of Us - Главная</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="img/logo.svg" alt="The Last of Us Logo" width="40" height="40">
            </a>
            <ul class="nav-links">
                <li><a href="story.html">Сюжет</a></li>
                <li><a href="characters.html">Персонажи</a></li>
                <li><a href="gallery.html">Галерея</a></li>
                <li><a href="about.html">О игре</a></li>
                <li><a href="contact.html">Контакты</a></li>
            </ul>
            <div class="burger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section class="hero">

        <div class="hero-bg">
            <img src="img/bgimage.jpg" alt="The Last of Us Hero">
        </div>
    
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1>
                THE LAST OF US<br>
                <span class="highlight">COMPLETE</span>
            </h1>
            <p>Погрузитесь в разрушенный мир,<br>где выживание – главное.</p>
            <p class="subtitle">Каждый шаг важен, а каждое решение<br>оставляет след в истории.</p>
            <button type="button" class="btn btn-trailer">Трейлер</button>
        </div>
    </section>
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 The Last of Us</p>
            <img src="img/dev.png" alt="Naughty Dog">
        </div>
    </footer>

    <!-- менюшка видоса-->

    <div id="trailerModal" class="trailer-modal" aria-hidden="true">
        <div class="trailer-modal-inner">
            <button type="button" class="trailer-modal-close" aria-label="Закрыть трейлер">✕</button>
            <video id="trailerVideo" class="trailer-modal-video" playsinline controls preload="metadata">
                <source src="img/trailer.mp4" type="video/mp4" />
                Ваш браузер не поддерживает видео.
            </video>
        </div>
    </div>

    <script src="js/menu.js"></script>
</body>
</html>
